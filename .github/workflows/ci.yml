name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (locked, all groups)
        run: uv sync --frozen --all-groups

      - name: Unit tests
        run: uv run pytest

      - name: Bandit
        run: uv run bandit -r src/secanalyzer

      - name: pip-audit
        run: uv run pip-audit
